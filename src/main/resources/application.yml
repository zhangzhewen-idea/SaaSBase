spring:
  application:
    name: saasbase
  profiles:
    default: dev
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
saasbase:
  file:
    root-path: ./data/files
