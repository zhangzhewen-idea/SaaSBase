spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_TEST_DATASOURCE_HOST}:3306/saasbase_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_TEST_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_TEST_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: ${SAASBASE_TEST_REDIS_HOST:localhost}
      port: 6379
