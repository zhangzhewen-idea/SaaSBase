spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_PROD_DATASOURCE_HOST}:3306/saasbase_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_PROD_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_PROD_DATASOURCE_PASSWORD}
  flyway:
    enabled: false
  data:
    redis:
      host: ${SAASBASE_PROD_REDIS_HOST:localhost}
      port: ${SAASBASE_PROD_REDIS_PORT:6379}
      password: ${SAASBASE_PROD_REDIS_PASSWORD:}
