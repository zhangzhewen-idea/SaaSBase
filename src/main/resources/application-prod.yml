spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_DATASOURCE_HOST}:3306/saasbase_prod?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${SAASBASE_DATASOURCE_USERNAME}
    password: ${SAASBASE_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: ${SAASBASE_REDIS_HOST}
      port: ${SAASBASE_REDIS_PORT:6379}
      password: ${SAASBASE_REDIS_PASSWORD:}
saasbase:
  security:
    jwt:
      secret: ${SAASBASE_JWT_SECRET}
