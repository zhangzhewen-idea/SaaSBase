spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_STAGING_DATASOURCE_HOST}:3306/saasbase_staging?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_STAGING_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_STAGING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: ${SAASBASE_STAGING_REDIS_HOST:localhost}
      port: 6379
saasbase:
  security:
    jwt:
      secret: ${SAASBASE_STAGING_JWT_SECRET:staging-only-jwt-secret-change-me-32}
