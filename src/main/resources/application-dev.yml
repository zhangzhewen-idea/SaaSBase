spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_DEV_DATASOURCE_HOST}:3306/saasbase_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_DEV_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_DEV_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: ${SAASBASE_DEV_REDIS_HOST:localhost}
      port: 6379
saasbase:
  security:
    jwt:
      secret: ${SAASBASE_DEV_JWT_SECRET}
