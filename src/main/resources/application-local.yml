spring:
  datasource:
    url: jdbc:mysql://localhost:3306/saasbase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_LOCAL_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_LOCAL_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
