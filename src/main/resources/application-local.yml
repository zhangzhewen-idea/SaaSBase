spring:
  datasource:
    url: jdbc:mysql://${SAASBASE_LOCAL_DATASOURCE_HOST}:3306/saasbase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SAASBASE_LOCAL_DATASOURCE_USERNAME:root}
    password: ${SAASBASE_LOCAL_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  data:
    redis:
      host: ${SAASBASE_LOCAL_REDIS_HOST:localhost}
      port: 6379
saasbase:
  security:
    jwt:
      secret: ${SAASBASE_LOCAL_JWT_SECRET:01234567890123456789012345678901}
